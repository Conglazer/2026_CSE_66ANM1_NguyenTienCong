<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="BT1.css">
</head>
<body>
    <div class="contact-form-container">
        <h2>Get in touch with us by filling contact form below</h2> <form>
            <div class="flex-row">
                <input type="text" placeholder="* Enter your full name" required> <input type="email" placeholder="* Enter your email address" required> </div>
    
            <div class="form-group">
                <input type="text" placeholder="Enter your subject"> </div>
    
            <div class="form-group">
                <textarea placeholder="* Your message here..." rows="8"></textarea> </div>
    
            <div class="flex-row footer-row">
                <button type="submit" class="send-btn">Send message</button> <span class="note">* Please fill all required form field, thanks!</span> </div>
        </form>
    </div>
</body>
</html>
